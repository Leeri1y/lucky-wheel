<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>想你啦~</title>
    <style>
        /* 淡入淡出动画 + 弹窗样式 */
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px;
            background: #fff0f5;
            border: 3px solid #ffccd5;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.5s;
            text-align: center;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .btn {
            margin-top: 15px;
            padding: 8px 20px;
            background: #ffccd5;
            color: #a62639;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="popup" id="firstPopup">
        <h2 style="color: #d85c8a;">Hi，有点想你了！</h2>
        <button class="btn" onclick="showTips()">我也想你了</button>
    </div>

    <script>
        // 初始淡入
        const popup = document.getElementById('firstPopup');
        setTimeout(() => popup.style.opacity = 1, 100);

        // 点击后淡出，生成随机提示弹窗
        function showTips() {
            popup.style.opacity = 0;
            setTimeout(() => popup.remove(), 500);
            
            // 随机提示文字/样式
            const tips = ['多喝水哦~', '保持微笑呀', '元气满满', '我想你了'];
            const colors = ['skyblue', 'lightgreen', 'lavender'];
            const tipCount = 50; // 简化版数量
            const interval = 100;

            let count = 0;
            const tipTimer = setInterval(() => {
                if (count >= tipCount) clearInterval(tipTimer);
                
                // 创建随机位置的提示弹窗
                const tip = document.createElement('div');
                tip.innerText = tips[Math.floor(Math.random() * tips.length)];
                tip.style.position = 'absolute';
                tip.style.left = Math.random() * (window.innerWidth - 200) + 'px';
                tip.style.top = Math.random() * (window.innerHeight - 100) + 'px';
                tip.style.padding = '10px';
                tip.style.background = colors[Math.floor(Math.random() * colors.length)];
                tip.style.fontSize = '16px';
                tip.style.borderRadius = '4px';
                document.body.appendChild(tip);
                
                count++;
            }, interval);
        }
    </script>
</body>
</html>
