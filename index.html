<h2 class="sr-only">2028年考研备考系统 — 备考计划总览、学习资料与每日打卡</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;}
#app{padding:0.5rem 0 2rem;font-family:var(--font-sans);}
.tabs{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:1.5rem;gap:0;}
.tab{padding:8px 16px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-muted);border-bottom:2px solid transparent;font-family:var(--font-sans);transition:color 0.15s;}
.tab.active{color:var(--text-accent);border-bottom-color:var(--border-accent);}
.tab:hover:not(.active){color:var(--text-secondary);}
.phase-bar{display:flex;gap:3px;border-radius:8px;overflow:hidden;height:50px;margin-bottom:1.5rem;}
.pseg{display:flex;flex-direction:column;justify-content:center;padding:0 10px;cursor:pointer;transition:opacity 0.15s;}
.pseg:hover{filter:brightness(0.92);}
.phase-card{border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.phase-head{padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 0.15s;}
.phase-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;color:white;}
.phase-body{padding:14px 16px;border-top:0.5px solid var(--border);}
.task-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);border-left:3px solid;margin-bottom:6px;background:var(--surface-1);}
.badge{font-size:11px;padding:2px 8px;border-radius:var(--radius);font-weight:500;white-space:nowrap;}
.info-box{padding:10px 12px;border-radius:var(--radius);border:0.5px solid var(--border);margin-top:10px;font-size:12px;color:var(--text-secondary);}
.res-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;}
.res-box{padding:12px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--surface-1);}
.res-label{font-size:11px;font-weight:500;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.res-item{font-size:12px;color:var(--text-secondary);padding:3px 0;display:flex;gap:6px;align-items:flex-start;line-height:1.45;border-bottom:0.5px solid var(--border);}
.res-item:last-child{border-bottom:none;}
.res-item::before{content:"·";color:var(--text-muted);flex-shrink:0;}
.prog-wrap{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:1.25rem;}
.prog-fill{height:100%;border-radius:3px;transition:width 0.35s;}
.tracker-section{border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.sec-head{padding:10px 14px;display:flex;align-items:center;gap:8px;background:var(--surface-1);border-bottom:0.5px solid var(--border);}
.check-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none;transition:background 0.12s;}
.check-row:last-child{border-bottom:none;}
.check-row:hover{background:var(--surface-1);}
.check-row.done{opacity:0.5;}
.check-row.done .ck-label{text-decoration:line-through;}
.check-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0;}
.save-btn{padding:8px 20px;background:var(--fill-accent);color:var(--on-accent);border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-sans);display:flex;align-items:center;gap:5px;}
.save-btn:hover{opacity:0.9;}
.date-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:1.25rem;}
.phase-pill{padding:8px 12px;border-radius:var(--radius);border:0.5px solid var(--border);font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:1rem;}
.cur-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;color:white;margin-left:auto;}
input[type=date]{font-size:13px;padding:6px 10px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary);font-family:var(--font-sans);}
textarea{width:100%;border:0.5px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-size:13px;resize:vertical;background:var(--surface-1);color:var(--text-primary);font-family:var(--font-sans);line-height:1.5;}
</style>

<div id="app">
  <div class="tabs">
    <button class="tab active" id="tab-overview" onclick="sw('overview')"><i class="ti ti-layout-list" aria-hidden="true"></i> 备考概览</button>
    <button class="tab" id="tab-resources" onclick="sw('resources')"><i class="ti ti-books" aria-hidden="true"></i> 学习资料</button>
    <button class="tab" id="tab-tracker" onclick="sw('tracker')"><i class="ti ti-checkbox" aria-hidden="true"></i> 每日打卡</button>
  </div>
  <div id="content"></div>
</div>

<script>
const PC=['#2a78d6','#4a3aa7','#eda100','#e34948'];
const PBG=['#e6f1fb','#eeedfe','#faeeda','#fcebeb'];
const SC={'数学':'#2a78d6','英语':'#1baf7a','专业课':'#4a3aa7','政治':'#e34948'};
const SBG={'数学':'#e6f1fb','英语':'#e1f5ee','专业课':'#eeedfe','政治':'#fcebeb'};
const STX={'数学':'#185fa5','英语':'#0f6e56','专业课':'#3c3489','政治':'#a32d2d'};

const PH=[
  {id:1,name:'地基期',short:'地基',period:'2026.07—2026.12',months:6,
   goal:'数学打扎实基础，英语积累词汇',
   tip:'工作日 1.5h（数学1h + 英语0.5h）· 周末单日 5h（数学2h + 英语1h + 了解专业课2h）',
   tasks:[
     {id:'p1m1',s:'数学',l:'听课/复习 1小时（武忠祥/汤家凤）'},
     {id:'p1m2',s:'数学',l:'课后习题练习'},
     {id:'p1e1',s:'英语',l:'背单词 50个（墨墨背单词）'},
     {id:'p1e2',s:'英语',l:'阅读真题 2篇（张剑黄皮书）'},
   ],
   res:{
     '数学':{b:['武忠祥《高等数学基础篇》','李永乐《线代辅导讲义》','汤家凤《考研数学复习全书·数学二》'],v:['武忠祥基础课（B站免费）','汤家凤基础班（网课平台）','李永乐线代基础班（B站）']},
     '英语':{b:['张剑《黄皮书》英语二真题（先做2010年前）','朱伟《恋恋有词》词汇书'],v:['朱伟恋恋有词词汇课（B站）','唐迟阅读方法课（网课）']},
     '专业课':{b:['查目标院校招生简章，下载专业课大纲','研招网/考研论坛获取近3年真题'],v:['暂不全面启动，熟悉大纲结构即可']},
   }
  },
  {id:2,name:'强化期',short:'强化',period:'2027.01—2027.06',months:6,
   goal:'数学专题强化，专业课系统启动',
   tip:'工作日 2h（数学1.5h + 英语0.5h）· 周末 6h（数学2h + 英语1h + 专业课3h）',
   tasks:[
     {id:'p2m1',s:'数学',l:'专题强化 1.5小时（计时完成）'},
     {id:'p2m2',s:'数学',l:'周模块练习题（每周至少1次）'},
     {id:'p2e1',s:'英语',l:'背单词 30个'},
     {id:'p2e2',s:'英语',l:'写作/翻译练习（2周1篇大作文）'},
     {id:'p2z1',s:'专业课',l:'教材精读 1章节'},
     {id:'p2z2',s:'专业课',l:'课后题 + 对应真题章节'},
   ],
   res:{
     '数学':{b:['李永乐《数学复习全书》数学二版','张宇《题源探析》（强化题型）','历年真题2010—2022计时精刷'],v:['张宇强化班专题模块','李永乐线代强化（B站精品）']},
     '英语':{b:['王江涛《高分写作》英语二','唐静《考研英语翻译专项》','张剑黄皮书2010年后真题'],v:['石雷鹏写作课','唐静翻译课（B站）']},
     '专业课':{b:['郑君里《信号与系统》或奥本海姆版','童诗白《模拟电子技术基础》（模电）','阎石《数字电子技术基础》（数电）'],v:['西安交大信号与系统公开课（B站）','目标院校专业课讲解（B站搜索院校名）']},
   }
  },
  {id:3,name:'冲刺期',short:'冲刺',period:'2027.07—2027.10',months:4,
   goal:'真题精刷，政治启动，全科模拟',
   tip:'工作日 3h · 周末全天 · 每周完成一套完整模拟卷 · 10月起各机构押题开始',
   tasks:[
     {id:'p3m1',s:'数学',l:'历年真题 1套（计时 2.5h）'},
     {id:'p3m2',s:'数学',l:'错题复盘（3天后重做）'},
     {id:'p3e1',s:'英语',l:'全题型模拟（计时 140分钟）'},
     {id:'p3z1',s:'专业课',l:'目标校真题训练'},
     {id:'p3z2',s:'专业课',l:'弱点章节补漏'},
     {id:'p3p1',s:'政治',l:'肖秀荣精讲精练 45分钟'},
   ],
   res:{
     '数学':{b:['历年真题全集（2010—2027）','李永乐6套卷','张宇8套卷（预压题）'],v:['错误对应章节重听强化课','各机构直播押题课（10月起）']},
     '英语':{b:['张剑黄皮书近年真题全刷','王江涛大作文范文20篇（背诵）'],v:['石雷鹏大作文押题课','考前范文精讲（各机构）']},
     '专业课':{b:['目标院校近5年真题（核心重点）','自整理错题本'],v:['目标院校考研经验贴（B站/知乎）','专业课答题规范参考']},
     '政治':{b:['肖秀荣《精讲精练》','肖秀荣《1000题》'],v:['徐涛冲刺课（B站）','腿姐技巧班']},
   }
  },
  {id:4,name:'收尾期',short:'收尾',period:'2027.11—2028.01',months:3,
   goal:'保持手感，政治冲刺，考前状态调节',
   tip:'全科保温 · 按正式考试时间作息 · 考前1周整卷模拟调节生物钟',
   tasks:[
     {id:'p4m1',s:'数学',l:'模拟卷保手感（李永乐6套/张宇4套）'},
     {id:'p4e1',s:'英语',l:'大作文范文背诵（每天1篇）'},
     {id:'p4z1',s:'专业课',l:'真题 + 模拟卷冲刺'},
     {id:'p4p1',s:'政治',l:'肖四大题答题框架背诵'},
     {id:'p4p2',s:'政治',l:'1000题二刷（选择题部分）'},
   ],
   res:{
     '数学':{b:['李永乐6套卷','张宇4套卷','个人错题本收尾复查'],v:['考前押题直播（各机构12月）','高频考点速查视频']},
     '英语':{b:['王江涛大作文10篇（必背）','小作文各类模板整理'],v:['石雷鹏押题作文','考前最后写作课']},
     '专业课':{b:['目标院校真题再刷','自整理知识点速查卡片'],v:['目标院校老师相关讲解（B站）']},
     '政治':{b:['肖四（必做，大题必背）','肖八选择题精刷','腿姐背诵手册'],v:['肖秀荣押题课','腿姐终极背诵班']},
   }
  },
];

let tab='overview',ep=1,erp=1;
let selDate=new Date().toISOString().slice(0,10);
let ckd={},notes='',status='';

function phaseFor(d){
  const dt=new Date(d);
  if(dt<new Date('2027-01-01'))return 1;
  if(dt<new Date('2027-07-01'))return 2;
  if(dt<new Date('2027-11-01'))return 3;
  return 4;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function sw(t){
  tab=t;
  ['overview','resources','tracker'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
  });
  render();
}
function togP(id){ep=ep===id?0:id;render();}
function togRP(id){erp=erp===id?0:id;render();}
function togTask(id){ckd[id]=!ckd[id];status='';render();}

function renderOverview(){
  const pid=phaseFor(selDate);
  let h='<div class="phase-bar">';
  PH.forEach((p,i)=>{
    const ac=p.id===pid,pa=p.id<pid;
    const bg=ac?PC[i]:pa?PC[i]+'99':'#d3d1c7';
    const tc=(ac||pa)?'white':'#5f5e5a';
    h+=`<div class="pseg" style="background:${bg};color:${tc};flex:${p.months}" onclick="togP(${p.id})">
      <div style="font-size:12px;font-weight:500">${p.name}</div>
      <div style="font-size:10px;opacity:0.8;margin-top:2px">${p.months}个月</div>
    </div>`;
  });
  h+='</div>';
  PH.forEach((p,i)=>{
    const exp=ep===p.id,cur=p.id===pid,c=PC[i],bg=PBG[i];
    h+=`<div class="phase-card" style="${cur?'border-color:'+c+'66':''}">
      <div class="phase-head" onclick="togP(${p.id})" style="${exp?'background:'+bg:''}">
        <div class="phase-num" style="background:${c}">${p.id}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:500;color:var(--text-primary)">第${p.id}阶段：${p.name}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${p.period} · ${p.goal}</div>
        </div>
        ${cur?`<span class="cur-badge" style="background:${c}">当前阶段</span>`:''}
        <i class="ti ${exp?'ti-chevron-up':'ti-chevron-down'}" style="color:var(--text-muted);font-size:16px;${cur?'':'margin-left:8px'}" aria-hidden="true"></i>
      </div>`;
    if(exp){
      h+=`<div class="phase-body">
        <div style="font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">每日任务</div>`;
      p.tasks.forEach(t=>{
        h+=`<div class="task-row" style="border-left-color:${SC[t.s]}">
          <span class="badge" style="background:${SBG[t.s]};color:${STX[t.s]}">${t.s}</span>
          <span style="font-size:13px;color:var(--text-secondary)">${t.l}</span>
        </div>`;
      });
      h+=`<div class="info-box"><i class="ti ti-clock" style="font-size:14px;vertical-align:-2px;margin-right:4px" aria-hidden="true"></i><span style="color:var(--text-primary);font-weight:500">时间建议：</span>${p.tip}</div>
      </div>`;
    }
    h+='</div>';
  });
  return h;
}

function renderResources(){
  let h='<div style="font-size:13px;color:var(--text-muted);margin-bottom:1.25rem">点击各阶段展开查看推荐书籍与视频课程</div>';
  PH.forEach((p,i)=>{
    const exp=erp===p.id,c=PC[i],bg=PBG[i];
    const subs=Object.keys(p.res);
    h+=`<div class="phase-card">
      <div class="phase-head" onclick="togRP(${p.id})" style="${exp?'background:'+bg:''}">
        <div class="phase-num" style="background:${c};border-radius:6px;width:24px;height:24px;font-size:12px">${p.id}</div>
        <div style="flex:1">
          <span style="font-size:14px;font-weight:500;color:var(--text-primary)">${p.name}</span>
          <span style="font-size:12px;color:var(--text-muted);margin-left:8px">${p.period}</span>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          ${subs.map(s=>`<span class="badge" style="background:${SBG[s]};color:${STX[s]}">${s}</span>`).join('')}
        </div>
        <i class="ti ${exp?'ti-chevron-up':'ti-chevron-down'}" style="color:var(--text-muted);font-size:16px;margin-left:8px" aria-hidden="true"></i>
      </div>`;
    if(exp){
      h+='<div class="phase-body">';
      subs.forEach(sub=>{
        const r=p.res[sub];
        h+=`<div style="margin-bottom:16px">
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px">
            <div style="width:9px;height:9px;border-radius:50%;background:${SC[sub]}"></div>
            <span style="font-size:14px;font-weight:500;color:${SC[sub]}">${sub}</span>
          </div>
          <div class="res-grid">
            <div class="res-box">
              <div class="res-label"><i class="ti ti-book-2" style="font-size:14px" aria-hidden="true"></i>书籍 / 资料</div>
              ${r.b.map(b=>`<div class="res-item">${esc(b)}</div>`).join('')}
            </div>
            <div class="res-box">
              <div class="res-label"><i class="ti ti-player-play" style="font-size:14px" aria-hidden="true"></i>视频课程</div>
              ${r.v.map(v=>`<div class="res-item">${esc(v)}</div>`).join('')}
            </div>
          </div>
        </div>`;
      });
      h+='</div>';
    }
    h+='</div>';
  });
  return h;
}

function renderTracker(){
  const pid=phaseFor(selDate),p=PH[pid-1],c=PC[pid-1];
  const total=p.tasks.length,done=p.tasks.filter(t=>ckd[t.id]).length;
  const pct=total>0?Math.round(done/total*100):0;
  const subs=[...new Set(p.tasks.map(t=>t.s))];

  let h=`<div class="date-row">
    <label style="font-size:13px;color:var(--text-secondary);display:flex;align-items:center;gap:5px">
      <i class="ti ti-calendar" style="font-size:16px" aria-hidden="true"></i>打卡日期
    </label>
    <input type="date" id="dp" value="${selDate}">
    <div style="margin-left:auto;font-size:13px;color:${c};font-weight:500">${done}/${total} 完成 · ${pct}%</div>
  </div>
  <div class="phase-pill" style="border-color:${c}44;background:${PBG[pid-1]}">
    <div style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0"></div>
    <span style="font-size:13px;color:var(--text-secondary)">第${pid}阶段 · <strong style="color:${c}">${p.name}</strong> · ${p.period}</span>
  </div>
  <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:${c}"></div></div>`;

  subs.forEach(sub=>{
    const tasks=p.tasks.filter(t=>t.s===sub);
    const sdone=tasks.filter(t=>ckd[t.id]).length;
    h+=`<div class="tracker-section">
      <div class="sec-head">
        <div style="width:9px;height:9px;border-radius:50%;background:${SC[sub]}"></div>
        <span style="font-size:13px;font-weight:500;color:${SC[sub]}">${sub}</span>
        <span style="margin-left:auto;font-size:12px;color:var(--text-muted)">${sdone}/${tasks.length}</span>
      </div>`;
    tasks.forEach(t=>{
      const d=!!ckd[t.id];
      h+=`<div class="check-row ${d?'done':''}" onclick="togTask('${t.id}')">
        <input type="checkbox" ${d?'checked':''} style="accent-color:${SC[t.s]}" onclick="event.stopPropagation();togTask('${t.id}')" aria-label="${esc(t.l)}">
        <span class="ck-label" style="font-size:13px;color:var(--text-primary);flex:1">${t.l}</span>
        ${d?`<i class="ti ti-check" style="color:${SC[t.s]};font-size:16px;flex-shrink:0" aria-hidden="true"></i>`:''}
      </div>`;
    });
    h+='</div>';
  });

  h+=`<div class="tracker-section" style="margin-top:12px">
    <div class="sec-head">
      <i class="ti ti-pencil" style="font-size:15px;color:var(--text-muted)" aria-hidden="true"></i>
      <span style="font-size:13px;font-weight:500;color:var(--text-secondary)">今日备注</span>
    </div>
    <div style="padding:10px 14px">
      <textarea id="na" rows="3" placeholder="今天遇到的问题、需要复习的知识点…">${esc(notes)}</textarea>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap">
    <button class="save-btn" onclick="saveData()">
      <i class="ti ti-device-floppy" style="font-size:15px" aria-hidden="true"></i>保存打卡
    </button>
    ${status?`<span style="font-size:13px;color:${status.includes('✓')?'#1baf7a':'#e34948'}">${esc(status)}</span>`:''}
    ${done===total&&total>0?`<span style="font-size:13px;color:#eda100;font-weight:500"><i class="ti ti-star" aria-hidden="true"></i> 今日全部完成！</span>`:''}
  </div>`;
  return h;
}

function render(){
  const el=document.getElementById('content');
  if(tab==='overview')el.innerHTML=renderOverview();
  else if(tab==='resources')el.innerHTML=renderResources();
  else el.innerHTML=renderTracker();
  bind();
}
function bind(){
  const dp=document.getElementById('dp');
  if(dp)dp.addEventListener('change',async e=>{selDate=e.target.value;await load();render();});
  const na=document.getElementById('na');
  if(na)na.addEventListener('input',e=>{notes=e.target.value;});
}
async function load(){
  try{
    const r=await window.storage.get('ky:'+selDate);
    if(r){const d=JSON.parse(r.value);ckd=d.t||{};notes=d.n||'';}
    else{ckd={};notes='';}
  }catch{ckd={};notes='';}
}
async function saveData(){
  const na=document.getElementById('na');
  if(na)notes=na.value;
  try{
    await window.storage.set('ky:'+selDate,JSON.stringify({t:ckd,n:notes}));
    status='已保存 ✓';
  }catch{status='保存失败，请重试';}
  render();
  setTimeout(()=>{status='';render();},2500);
}
(async()=>{await load();render();})();
</script>
